# Orpheus overrides — applied after the user's ~/.config/ghostty/config so
# these values win. Loaded by packages/ghostty-native/addon.mm via
# ghostty_config_load_file before recursive theme resolution.
#
# Removes the default 2-cell padding at the top and bottom of the terminal
# surface — the Orpheus window chrome (title bar + footer) already provides
# all the spacing the terminal needs, and the default leaves a visible gap
# between claude's status line and the footer.
window-padding-y = 0

# Cap per-surface scrollback to 2 MB (default is 10 MB per
# vendor/ghostty/src/config/Config.zig). Saves up to ~8 MB of heap per
# workspace, including hidden ones whose scrollback is still resident.
scrollback-limit = 2000000
