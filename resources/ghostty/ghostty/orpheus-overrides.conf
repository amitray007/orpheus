# Orpheus overrides — applied after the user's ~/.config/ghostty/config so
# these values win. Loaded by packages/ghostty-native/addon.mm via
# ghostty_config_load_file before recursive theme resolution.
#
# Removes the default 2-cell padding at the top and bottom of the terminal
# surface — the Orpheus window chrome (title bar + footer) already provides
# all the spacing the terminal needs, and the default leaves a visible gap
# between claude's status line and the footer.
window-padding-y = 0

# Cap per-surface scrollback to 2 MB (default is 10 MB per
# vendor/ghostty/src/config/Config.zig). Saves up to ~8 MB of heap per
# workspace, including hidden ones whose scrollback is still resident.
scrollback-limit = 2000000

# macOS treats Option as a compose key by default, which types glyphs (∂, ≈, ç …)
# instead of sending Alt/Meta escape sequences to the terminal. Setting this to
# `true` makes both Option keys send Alt/Meta, so readline/zsh line-editing
# shortcuts work — most importantly Option+Delete → ESC DEL → backward-kill-word
# (delete the previous word). This pairs with the mods translation in
# packages/ghostty-native/addon.mm keyDown: which calls
# ghostty_surface_key_translation_mods() — that function only remaps Option→Alt
# when macos-option-as-alt is enabled. Valid values: false | true | left | right
# (vendor/ghostty/src/input/config.zig); `true` enables it for both Option keys.
macos-option-as-alt = true

# Hide the mouse cursor while typing for a cleaner desktop-app feel.
# Ghostty default is false (vendor/ghostty/src/config/Config.zig).
# The cursor reappears as soon as the mouse is moved.
mouse-hide-while-typing = true
