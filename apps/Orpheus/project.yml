name: Orpheus
options:
  bundleIdPrefix: com.orpheus
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    PRODUCT_BUNDLE_IDENTIFIER: com.orpheus.app
    COMBINE_HIDPI_IMAGES: YES
    INFOPLIST_FILE: Orpheus/Resources/Info.plist
    ENABLE_HARDENED_RUNTIME: NO
    CODE_SIGNING_REQUIRED: NO
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  OrpheusDesign:
    path: ../../packages/OrpheusDesign
  OrpheusCore:
    path: ../../packages/OrpheusCore

targets:
  Orpheus:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Orpheus
        excludes:
          - "Resources/Info.plist"
    resources:
      - path: Orpheus/Resources/Assets.xcassets
    info:
      path: Orpheus/Resources/Info.plist
      properties:
        CFBundleDisplayName: Orpheus
        LSApplicationCategoryType: public.app-category.developer-tools
        # NSPrincipalClass is intentionally omitted: SwiftUI @main apps already
        # call NSApplicationMain (defaulting to NSApplication) via the @main
        # macro. Setting NSPrincipalClass = NSApplication explicitly is
        # redundant on launch and triggers a "More than one NSApplication
        # instance was created" crash inside the xcodebuild test host because
        # the test agent's NSApplication conflicts with the bundle's principal-
        # class lookup. Apple's own macOS App.xctemplate does not include this
        # key. See `apps/Orpheus/AGENTS.md` for the discipline note.
    settings:
      base:
        PRODUCT_NAME: Orpheus
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - package: OrpheusDesign
        product: OrpheusDesign
      - package: OrpheusCore
        product: OrpheusCore

  OrpheusAppTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: OrpheusAppTests
    settings:
      base:
        PRODUCT_NAME: OrpheusAppTests
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - target: Orpheus
      - package: OrpheusCore
        product: OrpheusCore
