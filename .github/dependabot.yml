# Dependabot configuration for Orpheus.
#
# Two ecosystems are configured:
#   - github-actions: keeps workflow action pins current (fully supported).
#   - npm: covers package.json JS deps. Dependabot understands bun.lock and
#     will update it alongside package.json. If bun.lock PRs misbehave (e.g.
#     Dependabot regenerates it incorrectly), disable this ecosystem by
#     removing the second entry below.
#
# Minor and patch bumps are grouped into a single PR per ecosystem per week
# to reduce noise. Major bumps still arrive as individual PRs.

version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types:
          - 'minor'
          - 'patch'
