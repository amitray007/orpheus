name: Release Please

# How this works:
#
#   On every push to main, release-please-action inspects the conventional-
#   commit history since the last tag and:
#     - If a "Release PR" with label `autorelease: pending` is already open,
#       updates it in place (force-pushes its branch). NEVER opens a duplicate.
#     - Otherwise opens a fresh Release PR with the proposed version + an
#       auto-generated CHANGELOG.md entry.
#
#   When you merge that Release PR, the same workflow runs again and this
#   time release-please creates the git tag + GitHub release. The second
#   job (build-and-attach) then builds the .dmg, uploads it to the release
#   as an asset, and pushes the matching cask to amitray007/homebrew-tap.
#
# Coexistence with the existing release.yml:
#
#   release.yml is MANUAL-ONLY (workflow_dispatch break-glass). This workflow
#   is the sole automatic release path. It builds the .dmg, uploads it to
#   BOTH the source repo release (provenance) AND the homebrew-tap release
#   (where the cask URL points), then renders and pushes the cask. The
#   `if:` below skips commits with `[release]` markers so the two never
#   fight over the same commit.
#
# Required secrets:
#
#   RELEASE_PLEASE_TOKEN (optional, falls back to GITHUB_TOKEN) — fine-
#     grained PAT with `contents: write` + `pull-requests: write` on this
#     repo. Needed if `main` is branch-protected and `github-actions[bot]`
#     can't bypass.
#   HOMEBREW_TAP_TOKEN — fine-grained PAT with `contents: write` on
#     amitray007/homebrew-tap (already set, reused by release.yml).

on:
  push:
    branches: [main]

# Sequential runs only — release-please writes git state (the Release PR
# branch) and multiple concurrent runs would race. cancel-in-progress:false
# preserves an in-flight Release PR update if a newer commit lands.
concurrency:
  group: release-please
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  preflight:
    # Skip commits that explicitly invoke the manual release pipeline via
    # release.yml's [release] marker — those ship through that workflow,
    # not through a Release PR. Job-level `if:` would match the marker
    # appearing anywhere in the commit (subject or body); we only want
    # to match against the subject line.
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
    steps:
      - name: Resolve trigger gate
        id: gate
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          SUBJECT=$(printf '%s' "$COMMIT_MSG" | head -n1)
          # Anchor the marker at end-of-subject so prose mentions of the
          # token (e.g. "fix the marker check") don't get treated as
          # manual-release commits that we'd skip.
          if echo "$SUBJECT" | grep -qE '\[release(\s+(patch|minor|major))?\][[:space:]]*$'; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "[preflight] subject ends with release marker → skip (release.yml handles it)"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "[preflight] subject does not end with release marker → run release-please"
          fi

  release-please:
    needs: preflight
    if: needs.preflight.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
      version: ${{ steps.rp.outputs.version }}
    steps:
      # ── Determine version bump from PR labels ─────────────────────────────
      # Look up the PR that was merged to produce this push commit, extract
      # any major/minor/patch bump label, compute the target version, and
      # export it as `release_as` (empty string = let always-bump-patch decide).
      #
      # Two-run flow:
      #   Run 1 — staging→main feature PR merged: may carry major/minor/patch
      #            label → this step computes and exports the override version.
      #   Run 2 — Release PR ("chore(release): orpheus vX.Y.Z") merged:
      #            that PR carries NO bump labels → step emits release_as=""
      #            → release-please just creates the tag/release with the
      #            version it already baked into the Release PR. No misfire.
      #
      # Empty-string safety: release-please-action@v4 reads release-as via
      # core.getInput() and checks `if (releaseAs)` before applying it.
      # An empty string is falsy in JS → treated identically to "not set"
      # → always-bump-patch from release-please-config.json takes over.
      - name: Resolve version bump from PR labels
        id: bump
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
        run: |
          # Fetch the PR(s) associated with this merge commit via the GitHub API.
          # The endpoint returns an array; a direct push returns [].
          LABELS=$(gh api \
            "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            --jq '.[0].labels[].name // empty' 2>/dev/null || echo "")

          echo "[bump] commit=${{ github.sha }}"
          echo "[bump] PR labels found: ${LABELS:-<none>}"

          # Determine the highest bump label present (major > minor > patch).
          BUMP=""
          if echo "$LABELS" | grep -qx "major"; then
            BUMP="major"
          elif echo "$LABELS" | grep -qx "minor"; then
            BUMP="minor"
          elif echo "$LABELS" | grep -qx "patch"; then
            BUMP="patch"
          fi

          echo "[bump] selected bump: ${BUMP:-patch (default, no label)}"

          # Compute the target version from the manifest's current version.
          # For patch / no label we emit release_as="" and let always-bump-patch
          # handle it — avoids computing the patch version here (release-please
          # already knows the current version from the manifest).
          if [ "$BUMP" = "major" ] || [ "$BUMP" = "minor" ]; then
            # Read current version from .release-please-manifest.json ("." key).
            CURRENT=$(gh api \
              "repos/${{ github.repository }}/contents/.release-please-manifest.json" \
              --jq '.content' | base64 -d | python3 -c "import sys,json; print(json.load(sys.stdin)['.'])")
            echo "[bump] current version from manifest: $CURRENT"

            MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            MINOR=$(echo "$CURRENT" | cut -d. -f2)

            if [ "$BUMP" = "major" ]; then
              NEXT="$((MAJOR + 1)).0.0"
            else
              NEXT="${MAJOR}.$((MINOR + 1)).0"
            fi

            echo "[bump] → release_as=$NEXT"
            echo "release_as=$NEXT" >> "$GITHUB_OUTPUT"
          else
            # patch or no bump label: let always-bump-patch decide — emit empty.
            echo "[bump] → release_as= (empty; always-bump-patch applies)"
            echo "release_as=" >> "$GITHUB_OUTPUT"
          fi

      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # Empty string → release-please-action treats it as "not set" (falsy
          # in core.getInput check) and falls back to always-bump-patch config.
          # Non-empty → forces that exact version, overriding commit-based bumping.
          release-as: ${{ steps.bump.outputs.release_as }}

  build-and-attach:
    # Only fire when the previous job actually created a release (i.e. the
    # Release PR was merged on this run). Most runs just update the PR and
    # this whole job is skipped.
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the tag release-please just created so the build sees
          # the bumped package.json + CHANGELOG.md.
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck (gate)
        run: bun run typecheck

      - name: Build native + renderer
        run: |
          bun run build:native
          bun run build

      - name: Build .dmg
        # `--publish never` is load-bearing: electron-builder otherwise sees
        # CI=true and tries to implicitly publish to GitHub Releases without
        # a GH_TOKEN, failing the step. We publish explicitly via gh release
        # upload below, so the implicit path must stay off.
        run: bunx electron-builder --mac --publish never

      - name: Compute sha256
        id: sha
        run: |
          DMG="dist/orpheus-${{ needs.release-please.outputs.version }}.dmg"
          if [ ! -f "$DMG" ]; then
            echo "::error::expected dmg not found at $DMG"
            ls -la dist || true
            exit 1
          fi
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"

      - name: Upload .dmg to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            "${{ steps.sha.outputs.dmg }}" --clobber

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: amitray007/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Publish dmg to homebrew-tap release
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAP_TAG="orpheus-${{ needs.release-please.outputs.tag_name }}"
          DMG="${{ steps.sha.outputs.dmg }}"
          # The homebrew-tap repo has IMMUTABLE releases enabled: assets must be
          # attached AT CREATION (a separate `gh release upload` 422s, and the
          # release can't be clobbered). So if a release for this tag already
          # exists (e.g. a retried run), delete it + its tag first, then create
          # fresh with the dmg attached in one shot.
          if gh release view "$TAP_TAG" --repo amitray007/homebrew-tap >/dev/null 2>&1; then
            echo "[release] $TAP_TAG already exists (immutable) — deleting to recreate with asset"
            gh release delete "$TAP_TAG" --repo amitray007/homebrew-tap --yes --cleanup-tag || \
              gh release delete "$TAP_TAG" --repo amitray007/homebrew-tap --yes
            # --cleanup-tag may not exist on older gh; fall back to explicit tag delete
            gh api -X DELETE "repos/amitray007/homebrew-tap/git/refs/tags/$TAP_TAG" 2>/dev/null || true
          fi
          # Create the release WITH the dmg attached in one step (immutable-safe).
          gh release create "$TAP_TAG" \
            "$DMG" \
            --repo amitray007/homebrew-tap \
            --title "Orpheus ${{ needs.release-please.outputs.tag_name }}" \
            --notes "Orpheus ${{ needs.release-please.outputs.tag_name }} binary release. Source: https://github.com/amitray007/orpheus/releases/tag/${{ needs.release-please.outputs.tag_name }}"

      - name: Render and push cask + scoped tag
        run: |
          # First-release case: Casks/ doesn't exist on a fresh tap repo yet.
          mkdir -p homebrew-tap/Casks
          sed -e "s/{{VERSION}}/${{ needs.release-please.outputs.version }}/g" \
              -e "s/{{SHA256}}/${{ steps.sha.outputs.sha }}/g" \
              scripts/orpheus-cask.template.rb > homebrew-tap/Casks/orpheus.rb

          cd homebrew-tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/orpheus.rb
          git commit -m "orpheus: bump to ${{ needs.release-please.outputs.version }}"

          SCOPED_TAG="orpheus/${{ needs.release-please.outputs.tag_name }}"
          git tag "$SCOPED_TAG"
          git push origin HEAD "$SCOPED_TAG"
