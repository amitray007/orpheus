name: Native build (libghostty pin)

# The main CI (ci.yml) deliberately skips the native build — it uses
# --ignore-scripts so typecheck/lint don't depend on the rotating third-party
# libghostty "storage.*" releases. But TWO kinds of change genuinely need a
# native build check: a libghostty pin bump (scripts/fetch-libghostty.sh) —
# the rolling Ghostty C API can drift between releases — and a direct edit to
# the native addon itself (packages/ghostty-surface/**), which is otherwise
# never compile-checked anywhere in CI (an Obj-C++ syntax error would merge
# green and only fail at release-build time).
#
# This workflow runs ONLY when one of those paths changes (paths filter), so
# unrelated PRs never pay the cost or risk the 404 of a rotated-out tag. A
# bump PR by definition points at a fresh, existing release, so the
# SHA-verified fetch succeeds. This automates the manual "verify it builds"
# step the bump PR asks for. (Runtime behavior — no freeze/render regression —
# still needs a human dogfood; there is no test harness for that yet.)
on:
  pull_request:
    paths:
      - 'scripts/fetch-libghostty.sh'
      - 'packages/ghostty-surface/**'
  workflow_dispatch:

concurrency:
  group: native-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native-build:
    name: build:native against the pinned libghostty
    runs-on: macos-14
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10

      - name: Install dependencies (runs postinstall — fetches the pinned libghostty)
        # No --ignore-scripts here (unlike ci.yml): the postinstall both fetches
        # the SHA-verified GhosttyKit.xcframework named by the (possibly bumped)
        # pin AND installs electron, whose ABI build:native targets.
        run: bun install --frozen-lockfile

      - name: Build native addon (the API-drift check)
        # Compiles packages/ghostty-surface/addon.mm against the pinned libghostty
        # headers + libghostty.a. Fails the PR if the rolling C API drifted in a
        # way that breaks the addon — the exact gap that was previously manual.
        run: bun run build:native
