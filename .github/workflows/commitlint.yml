name: Commitlint

on:
  pull_request:
    # Lint contributor PRs (which land on staging); skip the staging -> main
    # release PR, which aggregates already-checked commits plus merge commits.
    branches-ignore: [main]

# Cancel in-flight runs on the same PR when a newer commit lands.
concurrency:
  group: commitlint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    name: Lint commit messages
    # Lightweight check — no need for macOS runner.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history is needed so the action can walk from the PR base to
          # HEAD and lint every commit in the range.
          fetch-depth: 0

      - uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6.2.1
        with:
          configFile: commitlint.config.mjs
