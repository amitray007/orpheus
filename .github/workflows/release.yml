name: Release

# Triggered automatically when release-please pushes a vX.Y.Z tag to main.
# Tags are created exactly once per release (unlike main pushes, which fire on
# both the staging merge AND the release-please bump PR merge — the double-run
# race that corrupted v0.3.0). Tag-based triggering eliminates that race.
# Also runnable manually (workflow_dispatch) for one-off builds.
#
# What this does NOT do (release-please already handled it):
#   - bump package.json version
#   - create the git tag
#   - create the GitHub release on amitray007/orpheus
#
# What this does:
#   - build the native addon + renderer + .dmg on macos-14
#   - create a release on amitray007/homebrew-tap (public) and upload the .dmg
#     there so Homebrew can fetch it without auth (orpheus repo stays private)
#   - render the Homebrew cask pointing at the tap release and push it
#
# Secrets required:
#   HOMEBREW_TAP_TOKEN — fine-grained PAT with `contents: write` on
#                        amitray007/homebrew-tap

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build (e.g. v0.3.1)'
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            # push: tags trigger — github.ref_name is the tag (e.g. v0.3.1)
            TAG="${{ github.ref_name }}"
          fi
          VERSION="${TAG#v}"
          # Sanity gate: package.json version must match the tag we're building.
          PKG=$(node -p "require('./package.json').version")
          if [ "$PKG" != "$VERSION" ]; then
            echo "::error::package.json version ($PKG) does not match tag ($VERSION)"
            exit 1
          fi
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "[release] tag=$TAG version=$VERSION"

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck (gate)
        run: bun run typecheck

      - name: Build native + renderer
        run: |
          bun run build:native
          bun run build

      - name: Build .dmg
        run: bunx electron-builder --mac --publish never

      - name: Compute sha256
        id: sha
        run: |
          DMG="dist/orpheus-${{ steps.tag.outputs.version }}.dmg"
          if [ ! -f "$DMG" ]; then
            echo "::error::expected dmg not found at $DMG"
            ls -la dist || true
            exit 1
          fi
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: amitray007/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Create release on homebrew-tap and upload .dmg
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          # The DMG is hosted as a release on the public homebrew-tap repo so
          # Homebrew can download it without auth (orpheus source repo stays private).
          # --clobber is unconditional so the published asset is ALWAYS the dmg
          # built and hashed in this run — guaranteeing the asset matches the cask SHA.
          TAP_TAG="orpheus-${{ steps.tag.outputs.tag }}"
          gh release create "$TAP_TAG" \
            --repo amitray007/homebrew-tap \
            --title "Orpheus ${{ steps.tag.outputs.tag }}" \
            --notes "Orpheus ${{ steps.tag.outputs.tag }} binary release. Source: https://github.com/amitray007/orpheus/releases/tag/${{ steps.tag.outputs.tag }}" \
            2>/dev/null || echo "[release] tap release $TAP_TAG already exists — will clobber asset"
          gh release upload "$TAP_TAG" \
            "${{ steps.sha.outputs.dmg }}" \
            --repo amitray007/homebrew-tap \
            --clobber

      - name: Render and push cask
        run: |
          mkdir -p homebrew-tap/Casks
          sed -e "s/{{VERSION}}/${{ steps.tag.outputs.version }}/g" \
              -e "s/{{SHA256}}/${{ steps.sha.outputs.sha }}/g" \
              scripts/orpheus-cask.template.rb > homebrew-tap/Casks/orpheus.rb

          cd homebrew-tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/orpheus.rb
          git commit -m "orpheus: bump to ${{ steps.tag.outputs.version }}"
          git push origin HEAD
