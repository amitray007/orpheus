name: Release

# Triggered automatically when release-please merges its bump PR to main.
# release-please commits are "chore(release): orpheus vX.Y.Z" — we extract
# the version from package.json and build from the tagged commit.
# Also runnable manually (workflow_dispatch) for one-off builds.
#
# What this does NOT do (release-please already handled it):
#   - bump package.json version
#   - create the git tag
#   - create the GitHub release on amitray007/orpheus
#
# What this does:
#   - build the native addon + renderer + .dmg on macos-14
#   - create a release on amitray007/homebrew-tap (public) and upload the .dmg
#     there so Homebrew can fetch it without auth (orpheus repo stays private)
#   - render the Homebrew cask pointing at the tap release and push it
#
# Secrets required:
#   HOMEBREW_TAP_TOKEN — fine-grained PAT with `contents: write` on
#                        amitray007/homebrew-tap

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build (e.g. v0.2.0)'
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            # Proceed on release-please commits. Two forms land on main:
            #   1. Direct:  "chore(release): orpheus vX.Y.Z"  (squash/rebase merge)
            #   2. Merge:   "Merge pull request #N from .../release-please--branches--main..."
            # Both are safe signals — no other PRs come from the release-please branch prefix.
            COMMIT_MSG=$(git log -1 --pretty=%s)
            COMMIT_BRANCH="${{ github.event.head_commit.message }}"
            PR_BRANCH=$(git log -1 --pretty=%b | grep -o 'release-please--branches--main' || true)
            if ! echo "$COMMIT_MSG" | grep -qE '^chore\(release\):' && \
               ! echo "$COMMIT_MSG" | grep -qE 'release-please--branches--main'; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "[release] skipping: not a release-please commit ($COMMIT_MSG)"
              exit 0
            fi
            VERSION=$(node -p "require('./package.json').version")
            TAG="v${VERSION}"
          fi
          VERSION="${TAG#v}"
          echo "skip=false"       >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "[release] tag=$TAG version=$VERSION"

      - uses: oven-sh/setup-bun@v2
        if: steps.tag.outputs.skip != 'true'
        with:
          bun-version: latest

      - name: Install dependencies
        if: steps.tag.outputs.skip != 'true'
        run: bun install --frozen-lockfile

      - name: Typecheck (gate)
        if: steps.tag.outputs.skip != 'true'
        run: bun run typecheck

      - name: Build native + renderer
        if: steps.tag.outputs.skip != 'true'
        run: |
          bun run build:native
          bun run build

      - name: Build .dmg
        if: steps.tag.outputs.skip != 'true'
        run: bunx electron-builder --mac --publish never

      - name: Compute sha256
        if: steps.tag.outputs.skip != 'true'
        id: sha
        run: |
          DMG="dist/orpheus-${{ steps.tag.outputs.version }}.dmg"
          if [ ! -f "$DMG" ]; then
            echo "::error::expected dmg not found at $DMG"
            ls -la dist || true
            exit 1
          fi
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        if: steps.tag.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          repository: amitray007/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Create release on homebrew-tap and upload .dmg
        if: steps.tag.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          # The DMG is hosted as a release on the public homebrew-tap repo so
          # Homebrew can download it without auth (orpheus source repo stays private).
          TAP_TAG="orpheus-${{ steps.tag.outputs.tag }}"
          gh release create "$TAP_TAG" \
            "${{ steps.sha.outputs.dmg }}" \
            --repo amitray007/homebrew-tap \
            --title "Orpheus ${{ steps.tag.outputs.tag }}" \
            --notes "Orpheus ${{ steps.tag.outputs.tag }} binary release. Source: https://github.com/amitray007/orpheus/releases/tag/${{ steps.tag.outputs.tag }}" \
            || gh release upload "$TAP_TAG" \
                 "${{ steps.sha.outputs.dmg }}" \
                 --repo amitray007/homebrew-tap \
                 --clobber

      - name: Render and push cask
        if: steps.tag.outputs.skip != 'true'
        run: |
          mkdir -p homebrew-tap/Casks
          sed -e "s/{{VERSION}}/${{ steps.tag.outputs.version }}/g" \
              -e "s/{{SHA256}}/${{ steps.sha.outputs.sha }}/g" \
              scripts/orpheus-cask.template.rb > homebrew-tap/Casks/orpheus.rb

          cd homebrew-tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/orpheus.rb
          git commit -m "orpheus: bump to ${{ steps.tag.outputs.version }}"
          git push origin HEAD
