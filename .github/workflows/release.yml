name: Release

# MANUAL-ONLY break-glass release tool.
#
# release-please.yml is the automatic release path — it opens/merges Release
# PRs, creates the tag + GitHub release, builds the .dmg, and publishes it
# to the homebrew-tap release (where the cask URL points). Do not add push:
# triggers here; that would cause double-runs and SHA mismatches (the 0.3.0
# bug).
#
# Use this workflow only when you need to rebuild + republish a specific tag
# without going through the release-please PR flow (e.g. infrastructure fix
# that doesn't change source, repairing a botched tap release, etc.).
#
# What this does NOT do (release-please already handled it):
#   - bump package.json version
#   - create the git tag
#   - create the GitHub release on amitray007/orpheus
#
# What this does:
#   - build the native addon + renderer + .dmg on macos-14
#   - create a release on amitray007/homebrew-tap (public) and upload the .dmg
#     there so Homebrew can fetch it without auth (orpheus repo stays private)
#   - render the Homebrew cask pointing at the tap release and push it
#
# Secrets required:
#   HOMEBREW_TAP_TOKEN — fine-grained PAT with `contents: write` on
#                        amitray007/homebrew-tap

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build (e.g. v0.3.2)'
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            # push: tags trigger — github.ref_name is the tag (e.g. v0.3.1)
            TAG="${{ github.ref_name }}"
          fi
          VERSION="${TAG#v}"
          # Sanity gate: package.json version must match the tag we're building.
          PKG=$(node -p "require('./package.json').version")
          if [ "$PKG" != "$VERSION" ]; then
            echo "::error::package.json version ($PKG) does not match tag ($VERSION)"
            exit 1
          fi
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "[release] tag=$TAG version=$VERSION"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck (gate)
        run: bun run typecheck

      - name: Build native + renderer
        run: |
          bun run build:native
          bun run build

      - name: Build .dmg
        run: bunx electron-builder --mac --publish never

      - name: Compute sha256
        id: sha
        run: |
          DMG="dist/orpheus-${{ steps.tag.outputs.version }}.dmg"
          if [ ! -f "$DMG" ]; then
            echo "::error::expected dmg not found at $DMG"
            ls -la dist || true
            exit 1
          fi
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: amitray007/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Create release on homebrew-tap and upload .dmg
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          # The DMG is hosted as a release on the public homebrew-tap repo so
          # Homebrew can download it without auth (orpheus source repo stays private).
          # The homebrew-tap repo has IMMUTABLE releases enabled: assets must be
          # attached AT CREATION (a separate `gh release upload` 422s, and the
          # release can't be clobbered). So delete any existing release + tag
          # first, then create fresh with the dmg attached in one shot.
          TAP_TAG="orpheus-${{ steps.tag.outputs.tag }}"
          DMG="${{ steps.sha.outputs.dmg }}"
          if gh release view "$TAP_TAG" --repo amitray007/homebrew-tap >/dev/null 2>&1; then
            echo "[release] $TAP_TAG already exists (immutable) — deleting to recreate with asset"
            gh release delete "$TAP_TAG" --repo amitray007/homebrew-tap --yes --cleanup-tag || \
              gh release delete "$TAP_TAG" --repo amitray007/homebrew-tap --yes
            gh api -X DELETE "repos/amitray007/homebrew-tap/git/refs/tags/$TAP_TAG" 2>/dev/null || true
          fi
          gh release create "$TAP_TAG" \
            "$DMG" \
            --repo amitray007/homebrew-tap \
            --title "Orpheus ${{ steps.tag.outputs.tag }}" \
            --notes "Orpheus ${{ steps.tag.outputs.tag }} binary release. Source: https://github.com/amitray007/orpheus/releases/tag/${{ steps.tag.outputs.tag }}"

      - name: Render and push cask
        run: |
          mkdir -p homebrew-tap/Casks
          sed -e "s/{{VERSION}}/${{ steps.tag.outputs.version }}/g" \
              -e "s/{{SHA256}}/${{ steps.sha.outputs.sha }}/g" \
              scripts/orpheus-cask.template.rb > homebrew-tap/Casks/orpheus.rb

          cd homebrew-tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/orpheus.rb
          git commit -m "orpheus: bump to ${{ steps.tag.outputs.version }}"
          git push origin HEAD
