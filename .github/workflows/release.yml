name: Release

# Triggered automatically when release-please pushes a v*.*.* tag.
# Also runnable manually (workflow_dispatch) for one-off builds.
#
# What this does NOT do (release-please already handled it):
#   - bump package.json version
#   - create the git tag
#   - create the GitHub release shell
#
# What this does:
#   - build the native addon + renderer + .dmg on macos-14
#   - upload the .dmg to the existing GitHub release
#   - render the Homebrew cask and push it to amitray007/homebrew-tap
#
# Secrets required:
#   HOMEBREW_TAP_TOKEN — fine-grained PAT with `contents: write` on
#                        amitray007/homebrew-tap

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build (e.g. v0.2.0)'
        required: true
        type: string

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "[release] tag=$TAG version=$VERSION"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck (gate)
        run: bun run typecheck

      - name: Build native + renderer
        run: |
          bun run build:native
          bun run build

      - name: Build .dmg
        run: bunx electron-builder --mac --publish never

      - name: Compute sha256
        id: sha
        run: |
          DMG="dist/orpheus-${{ steps.tag.outputs.version }}.dmg"
          if [ ! -f "$DMG" ]; then
            echo "::error::expected dmg not found at $DMG"
            ls -la dist || true
            exit 1
          fi
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"

      - name: Upload .dmg to existing GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" \
            "${{ steps.sha.outputs.dmg }}" \
            --clobber

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: amitray007/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Render and push cask
        run: |
          mkdir -p homebrew-tap/Casks
          sed -e "s/{{VERSION}}/${{ steps.tag.outputs.version }}/g" \
              -e "s/{{SHA256}}/${{ steps.sha.outputs.sha }}/g" \
              scripts/orpheus-cask.template.rb > homebrew-tap/Casks/orpheus.rb

          cd homebrew-tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/orpheus.rb
          git commit -m "orpheus: bump to ${{ steps.tag.outputs.version }}"

          SCOPED_TAG="orpheus/${{ steps.tag.outputs.tag }}"
          git tag -f "$SCOPED_TAG"
          git push origin HEAD "$SCOPED_TAG" --force
