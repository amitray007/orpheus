name: CI

on:
  push:
    branches: [main, staging]
  pull_request:

# Cancel in-flight runs on the same ref when a newer commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck + lint + format + quality gates
    # typecheck + lint + the quality gates below don't need the native
    # xcframework or compiled addons, so we skip the postinstall
    # (--ignore-scripts below). This also decouples CI from the third-party
    # libghostty "storage" releases, which rotate weekly and 404 once the
    # pinned tag is rotated out. Runs on ubuntu (cheaper than macOS minutes);
    # the one job that genuinely needs macOS (native compile) lives in
    # native-build-check.yml, and DB-migration smoke (pure TS + node:sqlite,
    # no Electron ABI needed) lives in its own path-filtered ubuntu job below.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10

      - name: Cache bun dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        # --ignore-scripts: skip the postinstall (libghostty fetch + native
        # rebuild); neither is needed to typecheck or lint, and the libghostty
        # download depends on a rotating third-party release that 404s.
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        # --max-warnings ratchets the warning budget downward as findings close
        # (currently 146). Lower this number as warnings are cleaned up; never
        # raise it without reviewing what regressed.
        run: bunx eslint . --max-warnings=146

      - name: Format check
        run: bun run format:check

      - name: Duplication check (jscpd)
        run: bun run check:dup

      - name: Architecture / dependency-cruiser check
        run: bun run check:arch

      # Advisory: overlay-discipline guard currently has pre-existing findings
      # in the tree (src/renderer/src/overlay/kinds/ChipPrompt.tsx and
      # ChipTooltip.tsx trip the raw-primitive heuristic on comment text, not
      # actual unguarded overlay usage) — continue-on-error until that's
      # triaged/fixed so this doesn't block unrelated PRs. Flip to blocking
      # once the tree is clean.
      - name: Overlay discipline check (advisory)
        continue-on-error: true
        run: node scripts/check-overlay-discipline.mjs

      - name: Contrast check (WCAG-AA)
        run: node scripts/verify-contrast.mjs

      # Advisory: dead-code count (knip) is not yet a gate — 97 known findings
      # at time of writing. Runs so the count is visible in every CI log;
      # flip to blocking once the backlog is triaged.
      - name: Dead code check (knip, advisory)
        continue-on-error: true
        run: bun run check:dead

      # Advisory react-doctor check: surfaces React anti-patterns introduced by
      # this PR vs. the base branch. Non-blocking (continue-on-error: true) so it
      # never fails the job. To enforce, change to `--blocking error` once the
      # team is comfortable with the signal.
      - name: React Doctor (advisory — new issues vs base)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          bun run doctor:ci --base origin/${{ github.base_ref }}

      # No tests in this repo yet. When tests land, add `bun test` (or vitest/
      # playwright equivalents) as another step.

  migration-smoke-filter:
    name: Detect DB migration changes
    runs-on: ubuntu-latest
    outputs:
      db_changed: ${{ steps.filter.outputs.db }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            db:
              - 'src/main/db/**'
              - 'scripts/verify-migration-engine.ts'

  migration-smoke:
    name: DB migration smoke test
    needs: migration-smoke-filter
    if: needs.migration-smoke-filter.outputs.db_changed == 'true'
    # scripts/verify-migration-engine.ts (91 assertions) runs the declarative
    # migration engine (src/main/db/*.ts) under node:sqlite — pure TS, no
    # better-sqlite3/Electron ABI needed. Plain ubuntu + Node is sufficient;
    # this no longer needs the macOS/Electron setup the old
    # smoke-db-migrations.ts harness required.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install dependencies
        # --ignore-scripts: the harness uses node:sqlite (built into Node),
        # not better-sqlite3, so the postinstall native rebuild + libghostty
        # fetch aren't needed here.
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Smoke-test DB migrations
        run: bun run test:db
