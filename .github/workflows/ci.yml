name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs on the same ref when a newer commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck + lint
    # macOS runner because postinstall fetches a macOS xcframework. Cheaper
    # ubuntu would need --ignore-scripts plus a manual partial install; not
    # worth the complexity for a single-developer repo.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      # No tests in this repo yet. When tests land, add `bun test` (or vitest/
      # playwright equivalents) as another step.
