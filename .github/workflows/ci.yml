name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs on the same ref when a newer commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck + lint + format
    # typecheck + lint don't need the native xcframework or compiled addons, so
    # we skip the postinstall (--ignore-scripts below). This also decouples CI
    # from the third-party libghostty "storage" releases, which rotate weekly
    # and 404 once the pinned tag is rotated out. (Runner could be ubuntu now;
    # kept on macOS-14 to match the rest of the toolchain.)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        # --ignore-scripts: skip the postinstall (libghostty fetch + native
        # rebuild); neither is needed to typecheck or lint, and the libghostty
        # download depends on a rotating third-party release that 404s.
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      # No tests in this repo yet. When tests land, add `bun test` (or vitest/
      # playwright equivalents) as another step.
