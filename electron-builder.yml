appId: dev.orpheus.app
productName: Orpheus
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
asarUnpack:
  # Native .node bundles cannot be loaded from inside an asar archive;
  # electron-builder extracts anything matching these globs to app.asar.unpacked/
  - resources/**
  - '**/*.node'
extraResources:
  # Copy each native addon's built .node file into Contents/Resources/packages/<pkg>/
  # so the main process can load them from process.resourcesPath at runtime.
  - from: packages/ghostty-native/build/Release/ghostty_native.node
    to: packages/ghostty-native/ghostty_native.node
  # Ghostty terminfo sentinel — must live at Contents/Resources/terminfo/78/xterm-ghostty
  # so Ghostty's auto-walk (resourcesdir.zig) finds the bundle when scanning up from the
  # Contents/MacOS/Orpheus executable.
  - from: resources/ghostty/terminfo
    to: terminfo
    filter:
      - "**/*"
  # Ghostty resources dir — shell-integration scripts etc.
  # Ghostty sets app_path = Contents/Resources/ghostty after the sentinel walk.
  - from: resources/ghostty/ghostty
    to: ghostty
    filter:
      - "**/*"
  # Wrapper script: runs claude in a login zsh, then exec's interactive zsh
  # after claude exits so the terminal stays alive for further use.
  - from: resources/orpheus-claude.sh
    to: orpheus-claude.sh
  # Hook notification shim — invoked by Claude Code hooks to post activity events
  # to Orpheus's Unix-domain socket. Lives at Contents/Resources/bin/orpheus-notify.
  - from: resources/bin/orpheus-notify
    to: bin/orpheus-notify
win:
  executableName: Orpheus
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
# Distribution: Homebrew Cask via amitray007/homebrew-tap.
# Releases are published manually via `bun run release`, which uploads the
# .dmg to amitray007/orpheus releases and bumps the cask file in the tap.
# No electron-builder auto-publish; no electron-updater. See scripts/release.mjs.
